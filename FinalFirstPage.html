    <style>
        body {
            background-color: white;
            margin: 0;
            padding: 0;
        }
        .head-section {
            display: flex;
            width: 100%;
            height: 50vh;
            position: relative;
            overflow: hidden;
        }
        .head-section img {
            width: 33.33%;
            height: 100%;
            object-fit: cover;
            position: absolute;
        }
        .head-section .left {
            left: 0;
        }
        .head-section .center {
            left: 33.33%;
        }
        .head-section .right {
            right: 0;
        }
        .head-section::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(255, 255, 255, 0) 30%, white 50%, rgba(255, 255, 255, 0) 70%);
        }
        
        /* Branding */
        .branding-container {
            position: absolute;
            left: 50%;
            top: 45%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            z-index: 4;
        }

        .logo {
            font-size: 35px;
            font-weight: bold;
            color: black;
            background: rgba(255, 255, 255, 0.7);
            padding: 3px 7px;
            border-radius: 10px;
            margin-right: 1px;
            display: flex;
            position: relative;
        }
        .g {
            position: relative;
            z-index: 1;
            left: 6px;
            top: 6px;
            font-size: 25px;
            font-weight: bold;
        }
        .t {
            position: absolute;
            left: 2px;
            top: 1px;
            font-size: 25px;
            font-weight: bold;
            z-index: 2;
        }

        .techguide-text {
            font-size: 25px;
            font-weight: bold;
            color: white;
            text-shadow: 3px 3px 6px black;
        }

        /* Quote and Search */
        .quote-container {
            position: absolute;
            left: 50%;
            bottom: 15%;
            transform: translateX(-50%);
            width: 33.33%;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: black;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .search-container {
            margin-top: 10px;
            position: relative;
            width: 300px;
        }
        .search-box {
            width: 70%;
            padding: 10px 40px 10px 40px;
            border: 2px solid gray;
            border-radius: 20px;
            outline: none;
            background-color: white;
            color: black;
            text-align: left;
        }

        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }
