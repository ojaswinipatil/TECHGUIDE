<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Layout</title>
    <style>
        body {
            background-color: #ffffff; /* Off-white */
            margin: 0;
            padding: 0;
            text-align: center;
        }
        .header {
            background-color: #ffdd32; /* Pale Yellow */
            padding: 40px;
            text-align: center;
        }
        .header img {
            width: 1000px;
            height: 60px;
        }
        .container {
            width: 80%;
            margin: 0 auto;
            padding-top: 50px;
            display: flex;
            justify-content: space-between;
        }
        .left-images {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .left-images img {
            width: 600px;
            height: 50;
            margin-bottom: 20px;
            transition: transform 0.3s ease-in-out;
        }
              .right-image {
            position :relative;
            alignment:right;
            padding-top: 40px;
        }
        .right-image img {
            width: 300px;
            height:400px;
        }
    </style>
   </head>
