<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Layout</title>
    <style>
        body {
            background-color: #ffffff; /* Off-white */
            margin: 0;
            padding: 0;
            text-align: center;
        }
        .header {
            background-color: #ffde32; /* Pale Yellow */
            padding: 40px;
            text-align: center;
        }
        .header img {
            width: 1000px;
            height: 60px;
        }
        .container {
            width: 80%;
            margin: 0 auto;
            padding-top: 50px;
            display: flex;
            justify-content: space-between;
        }
        .left-images {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .left-images img {
            width: 700px;
            height: 40;
            margin-bottom: 20px;
            transition: transform 0.3s ease-in-out;
        }
        .left-images img:hover {
            transform: scale(1.1);
            cursor: pointer;
        }
        .right-image {
            position :relative;
            alignment:right;
            padding-top: 40px;
        }
        .right-image img {
            width: 300px;
            height: 400px;
        }
    </style>
    <script>
        function navigateToPage(imageNumber) {
            window.location.href = 'page' + imageNumber + '.html';
        }
    </script>
</head>
<body>
    <div class="header">
        <img src="C:\users\hp\Downloads\Your paragraph text (14).png" alt="Header Image">
    </div>
    <div class="container">
        <div class="left-images">
            <img src="C:\Users\hp\Downloads\Choose a specialization (Web Dev, Mobile, AI, Backend) (10).png" alt="Image 1" onclick="navigateToPage(21)">

        </div>
        <div class="right-image">
            <img src="C:\Users\hp\OneDrive\Pictures\Camera Roll\download (6).jpg" alt="Image 11">
        </div>
    </div>
</body>
</html>
