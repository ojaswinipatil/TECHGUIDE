<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Your Query</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: #ffffff; /* Dark background */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Container */
        .container {
            background: #f9ffdc;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 6px 20px rgba(255, 193, 7, 0.4);
            text-align: center;
            max-width: 600px;
            width: 90%;
            animation: fadeIn 0.6s ease-in-out;
        }

        /* Title */
        h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 32px;
        }

        /* Query Box */
        .query-box {
            width: 100%;
            padding: 18px;
            border: 3px solid #ffc107;
            border-radius: 12px;
            font-size: 20px;
            resize: none;
            transition: 0.3s;
        }

        .query-box:focus {
            outline: none;
            border-color: #ff9800;
            box-shadow: 0 0 12px rgba(255, 193, 7, 0.4);
        }

        /* Submit Button */
        .submit-btn {
            background: #ffc107;
            color: #222;
            border: none;
            padding: 15px 25px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 10px;
            margin-top: 20px;
            transition: background 0.3s, transform 0.2s;
        }

        .submit-btn:hover {
            background: #ff9800;
            transform: scale(1.07);
        }

        /* Popup */
        .popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 12px rgba(255, 193, 7, 0.4);
            text-align: center;
            width: 500px;
            max-width: 90%;
            animation: slideDown 0.5s ease;
        }

        .popup p {
            font-size: 20px;
            color: #333;
        }

        .popup button {
            margin-top: 15px;
            padding: 12px 20px;
            border: none;
            background: #ffc107;
            color: #222;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .popup button:hover {
            background: #ff9800;
        }

        /* Contact Section */
        .contact-info {
            margin-top: 30px;
            font-size: 18px;
            color: #fff;
            text-align: center;
        }

        .contact-info p {
            margin: 8px 0;
        }

        .contact-info a {
            color: #ffc107;
            text-decoration: none;
            font-weight: bold;
        }

        .contact-info a:hover {
            text-decoration: underline;
        }

        /* Icons */
        .icon {
            font-size: 22px;
            margin-right: 10px;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -60%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Have a Query? Ask Us!</h2>
        <textarea id="queryInput" class="query-box" rows="6" placeholder="Enter your query..."></textarea>
        <button class="submit-btn" onclick="submitQuery()">Submit</button>
    </div>

    <div class="popup" id="popup">
        <p>Your query has been submitted. We will contact you as soon as possible!</p>
        <button onclick="closePopup()">OK</button>
    </div>

    <div class="contact-info">
        <p><span class="icon">📞</span> Contact: <a href="tel:+919876543210">+91 98765 43210</a></p>
        <p><span class="icon">📧</span> Email: <a href="mailto:support@example.com">support@example.com</a></p>
    </div>

    <script>
        function submitQuery() {
            let query = document.getElementById("queryInput").value.trim();
            if (query === "") {
                alert("Please enter your query before submitting.");
                return;
            }
            document.getElementById("queryInput").value = ""; // Clear input
            document.getElementById("popup").style.display = "block"; // Show popup
        }

        function closePopup() {
            document.getElementById('popup').style.display = 'none'; // Hide popup
        }
    </script>

</body>
</html>
