<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Layout</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            background-color: white;
            margin: 0;
            padding: 0;
        }
        .head-section {
            width: 100%;
            height: 100px;
            background-color: #ffde32;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .head-section img {
            width: 1000px;
            height: 60px;
        }
        .image-container {
            position: relative;
            display: flex;
            flex-direction: column;
            
            margin-top: 50px;
        }
        .second-image {
            position: absolute;
            top: 50px;
            right: 0px;
            width: 300px;
            height: 300px;
        }
        .third-image {
            margin-top: 50px;
            width: 1000px;
            height: 300px;
            position: absolute;
            left:0px;

        }
        .fourth-image {
            position: absolute;
            left:0px;
            margin-top: 400px;
            width: 1000px;
            height: 60px;
            transition: transform 0.3s ease-in-out;
            cursor: pointer;
        }
        .fourth-image:hover {
            transform: scale(1.1);
        }
        .fourth-image:active {
            transform: rotate(360deg) scale(1.2);
            transition: transform 0.5s ease-in-out;
        }
    </style>
    <script>
        function goToNextPage() {
            window.location.href = "FinalQuiz.html";
        }
    </script>
</head>
<body>
    <div class="head-section">
        <img src="C:\Users\hp\Downloads\Your paragraph text (10).png" alt="Head Image">
    </div>
    <div class="image-container">
        <img class="second-image" src="C:\Users\hp\Downloads\download (5).jfif" alt="Second Image">
        <img class="third-image" src="C:\Users\hp\Downloads\🌟 Discover Your Unique Domain of Interest! 🚀 Exploring your personalized domain of interest helps unlock your true potential ✨, making learning and career choices more engaging and fulfilling. U.png" alt="Third Image">
        <img class="fourth-image" src="C:\Users\hp\Downloads\LET’S GET STARTED.png" alt="Fourth Image" onclick="goToNextPage()">
    </div>
</body>
</html>
